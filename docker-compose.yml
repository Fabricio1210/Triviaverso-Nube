services:
  trivia-api:
    build: ./BACKEND
    container_name: backend-trivia
    ports:
      - "3001:3000"
    environment:
      - AWS_ACCESS_KEY_ID_1=${AWS_ACCESS_KEY_ID_1}
      - AWS_SECRET_ACCESS_KEY_1=${AWS_SECRET_ACCESS_KEY_1}
      - AWS_SESSION_TOKEN_1=${AWS_SESSION_TOKEN_1}
      - SNS_TOPIC_ARN=${SNS_TOPIC_ARN}
      - AWS_REGION=${AWS_REGION}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    restart: always

  trivia-web:
    build: ./FRONTEND
    container_name: frontend-trivia
    ports:
      - "80:80"
    depends_on:
      - trivia-api
    restart: always